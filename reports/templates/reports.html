{% extends 'base.html' %} 
{% load humanize %}
{% block title %} Reports {% endblock %} 
{% block mainbody %}

<div class="container py-4">

  <h4 class="mb-4 fw-semibold">
    <i class="bi bi-bar-chart-fill me-2 text-warning"></i>Reports Overview
  </h4>

  <div class="row g-4">

    <!-- Total Rooms -->
    <div class="col-md-4">
      <div class="card bg-dark text-white border-0 shadow">
        <div class="card-body d-flex align-items-center gap-3 py-4">
          <div class="fs-1 text-warning">
            <i class="bi bi-door-open-fill"></i>
          </div>
          <div>
            <div class="text-secondary small text-uppercase fw-semibold">Total Rooms</div>
            <div class="fs-2 fw-bold">{{ total_rooms|intcomma }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Total Guests -->
    <div class="col-md-4">
      <div class="card bg-dark text-white border-0 shadow">
        <div class="card-body d-flex align-items-center gap-3 py-4">
          <div class="fs-1 text-info">
            <i class="bi bi-people-fill"></i>
          </div>
          <div>
            <div class="text-secondary small text-uppercase fw-semibold">Total Guests</div>
            <div class="fs-2 fw-bold">{{ total_guests|intcomma }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Total Payments -->
    <div class="col-md-4">
    <div class="card bg-dark text-white border-0 shadow">
        <div class="card-body d-flex align-items-center gap-3 py-4">
        <div class="fs-1 text-success">
            <i class="bi bi-cash-stack"></i>
        </div>
        <div>
            <div class="text-secondary small text-uppercase fw-semibold">Total Payments</div>
            <div class="fs-2 fw-bold">UGX {{ total_payments|floatformat:2|intcomma }}</div>
        </div>
        </div>
    </div>
    </div>

  </div>
</div>


{% endblock %}
