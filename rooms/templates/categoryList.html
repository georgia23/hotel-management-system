{% extends 'base.html' %}

{% block title %} Category List {% endblock %}

{% block mainbody %}



<br><br>
<div class="d-flex justify-content-center">
    <h4>Category List</h4>


   
</div>
<br>

 <!-- Category Table -->
    <div class="container shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Category Name</th>
              <th>Actions</th>
    
            </tr>
          </thead>
          <tbody>
            {% for category in categories %}
            <tr>
              <td class="text-muted small align-middle">{{ forloop.counter }}</td>
              <td class="align-middle">{{ category.name }}</td>
              <td class="align-middle">
                <a href= "{% url 'editCategory' category.id %}" class="btn btn-outline-primary btn-sm me-1">Edit</a>
            
              </td>
            </tr>
            {% endfor %}
            
          </tbody>
        </table>
      </div>
    </div>

{% endblock %}
